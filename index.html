<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aeterna | 5s Instax Frame</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&family=Nanum+Pen+Script&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>

    <style>
        :root {
            --bg-color: #f6f8fb;
            --btn-gradient: linear-gradient(90deg, #ff8da1 0%, #ffb6b9 100%);
            --card-shadow: 0 12px 40px rgba(0, 0, 0, 0.04);
        }

        body {
            background-color: #f6f8fb;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255, 230, 235, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(220, 235, 255, 0.4) 0%, transparent 50%);
            font-family: 'Noto Sans TC', sans-serif;
            color: #333;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; position: relative; margin: 0; padding-bottom: 2rem;
        }

        /* --- 漂浮背景 --- */
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(var(--rot)); } 50% { transform: translateY(-12px) rotate(calc(var(--rot) + 2deg)); } }
        .floating-instax { position: absolute; width: 70px; height: 85px; background: rgba(255,255,255,0.8); padding: 4px 4px 15px 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border-radius: 2px; animation: float 6s infinite ease-in-out; backdrop-filter: blur(2px); }
        .floating-instax::after { content: ""; display: block; width: 100%; height: 100%; background: linear-gradient(135deg, #ffe0e5 0%, #ffecd2 100%); opacity: 0.5; }
        .fi-1 { top: 12%; left: calc(50% - 320px); --rot: -10deg; animation-delay: 0s; }
        .fi-2 { top: 22%; right: calc(50% - 320px); --rot: 12deg; animation-delay: -2s; }
        .fi-3 { bottom: 18%; left: calc(50% - 280px); --rot: 8deg; animation-delay: -4s; }
        .fi-4 { bottom: 12%; right: calc(50% - 280px); --rot: -15deg; animation-delay: -1s; }
        @media (max-width: 600px) { .fi-1 { left: -15px; } .fi-2 { right: -15px; } .fi-3 { left: -25px; } .fi-4 { right: -25px; opacity: 0.5; } }

        /* --- 主視覺區 --- */
        .main-wrapper { position: relative; z-index: 10; width: 100%; max-width: 420px; display: flex; flex-direction: column; align-items: center; padding-top: 1rem; }
        .camera-icon { width: 42px; height: 32px; background-color: #ffcce0; border-radius: 6px; position: relative; margin-bottom: 0.2rem; display: flex; justify-content: center; align-items: center; transform: scale(0.85); }
        .camera-icon::before { content: ""; position: absolute; top: -4px; left: 50%; transform: translateX(-50%); width: 14px; height: 4px; background-color: #ffcce0; border-radius: 2px 2px 0 0; }
        .camera-icon-lens { width: 16px; height: 16px; background: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        .camera-icon-lens::after { content: ""; width: 6px; height: 6px; background: #ffcce0; border-radius: 50%; }
        
        .title-text { font-family: 'Fredoka', sans-serif; font-size: 2.6rem; font-weight: 600; letter-spacing: -0.02em; background: linear-gradient(90deg, #d8549e 0%, #765deb 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; line-height: 1.1; }
        .subtitle-text { color: #8c98a4; font-size: 0.75rem; margin-top: 0.2rem; margin-bottom: 0.8rem; font-weight: 500; text-align: center; padding: 0 10px; }

        /* --- 照片舞台 --- */
        .stage { width: 100%; display: flex; justify-content: center; align-items: center; margin-bottom: 1rem; perspective: 1000px; }
        
        .instax-frame { 
            background: linear-gradient(135deg, #ffffff 0%, #fcfcfd 50%, #f4f5f8 100%); 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 0 5px 15px rgba(0,0,0,0.04);
            border-radius: 2px; padding: 12px 12px 52px 12px; transition: width 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), height 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); position: relative; display: flex; flex-direction: column; 
        }
        
        .size-mini { width: 230px; height: 360px; }
        .size-square { width: 310px; height: 360px; }
        .size-wide { width: 360px; height: 280px; }
        
        .photo-area { width: 100%; height: 100%; background-color: #fbfbfc; position: relative; overflow: hidden; cursor: pointer; border: 1px solid #e2e8f0; border-radius: 1px; }
        .dashed-border { position: absolute; top: 2px; left: 2px; right: 2px; bottom: 2px; border: 1.5px dashed #e2e8f0; pointer-events: none; border-radius: 2px; }
        
        .upload-wrapper { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; z-index: 2; }
        .upload-icon { width: 36px; height: 36px; border-radius: 50%; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; justify-content: center; align-items: center; color: #ff8da1; font-size: 1.2rem; margin-bottom: 8px; }
        .upload-text { color: #cbd5e1; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.05em; text-align: center; white-space: nowrap; }

        /* 換照片按鈕 */
        .reupload-btn {
            position: absolute; top: 20px; right: 20px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); color: #475569; padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; display: none; align-items: center; gap: 6px; z-index: 50; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.9); transition: all 0.2s ease;
        }
        .reupload-btn:active { transform: scale(0.95); }

        .drag-hint { position: absolute; top: 8px; left: 0; width: 100%; text-align: center; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: rgba(255,255,255,0.9); text-shadow: 0 1px 4px rgba(0,0,0,0.4); z-index: 15; pointer-events: none; display: none; animation: pulseHint 2s infinite; }
        @keyframes pulseHint { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }

        #preview-image { position: absolute; top: 0; left: 0; transform-origin: 0 0; z-index: 5; display: none; opacity: 1; max-width: none !important; max-height: none !important; }
        
        /* 1. 日系空氣 (Ethereal) */
        @keyframes dev-ethereal {
            0% { filter: brightness(4) contrast(0.5) saturate(0); }
            30% { filter: brightness(1.8) contrast(0.6) saturate(0.2) sepia(0.2) hue-rotate(180deg); }
            100% { filter: brightness(1.15) contrast(0.9) saturate(0.8) sepia(0.1) hue-rotate(5deg); }
        }
        #photo-container[data-style="ethereal"] #preview-image.instax-effect { animation: dev-ethereal 5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        #photo-container[data-style="ethereal"] .photo-overlay { 
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.15) 0%, rgba(0,0,0,0) 80%); 
            box-shadow: inset 0px 2px 8px rgba(0,0,0,0.1); 
        }

        /* 2. 經典復古 (Nostalgic) */
        @keyframes dev-nostalgic {
            0% { filter: brightness(4) contrast(0.5) saturate(0); }
            30% { filter: brightness(1.5) contrast(0.7) saturate(0.3) sepia(0.6) hue-rotate(150deg); }
            100% { filter: contrast(1.2) brightness(1.0) saturate(0.9) sepia(0.3) hue-rotate(-15deg); }
        }
        #photo-container[data-style="nostalgic"] #preview-image.instax-effect { animation: dev-nostalgic 5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        #photo-container[data-style="nostalgic"] .photo-overlay { 
            background: radial-gradient(circle at 50% 50%, transparent 40%, rgba(40, 20, 10, 0.5) 100%); 
            box-shadow: inset 0px 4px 12px rgba(0,0,0,0.25), inset 0px 1px 3px rgba(0,0,0,0.15); 
        }

        /* 3. 街頭漏光 (Y2K Pop) */
        @keyframes dev-y2k {
            0% { filter: brightness(4) contrast(0.5) saturate(0); }
            30% { filter: brightness(1.6) contrast(0.8) saturate(0.5) sepia(0.4) hue-rotate(90deg); }
            100% { filter: contrast(1.15) brightness(1.05) saturate(1.4) sepia(0.1); }
        }
        #photo-container[data-style="y2k"] #preview-image.instax-effect { animation: dev-y2k 5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        #photo-container[data-style="y2k"] .photo-overlay { 
            background: radial-gradient(circle at 50% 50%, transparent 50%, rgba(60, 30, 20, 0.25) 100%); 
            box-shadow: inset 0px 3px 10px rgba(0,0,0,0.2); 
        }
        #photo-container[data-style="y2k"] .static-leak { display: block; }

        .noise-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 12; pointer-events: none; display: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.4'/%3E%3C/svg%3E");
            opacity: 0.12; 
        }

        .light-leak {
            position: absolute; top: 0; left: -100%; width: 150%; height: 100%; z-index: 11; pointer-events: none; display: none;
            background: linear-gradient(90deg, transparent 0%, rgba(255, 120, 50, 0.5) 40%, rgba(255, 50, 50, 0.6) 60%, transparent 100%);
            mix-blend-mode: screen; filter: blur(12px);
        }
        @keyframes lightSweep {
            0% { transform: translateX(-10%) skewX(-20deg); opacity: 0; }
            15% { opacity: 1; transform: translateX(10%) skewX(-20deg); }
            85% { opacity: 0.8; transform: translateX(80%) skewX(-20deg); }
            100% { transform: translateX(120%) skewX(-20deg); opacity: 0; }
        }
        .light-leak-anim { animation: lightSweep 4.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        
        .static-leak {
            position: absolute; top: 0; right: 0; width: 35%; height: 100%; z-index: 11; pointer-events: none; display: none;
            background: linear-gradient(90deg, transparent 0%, rgba(255, 60, 0, 0.1) 60%, rgba(255, 0, 0, 0.25) 100%);
            mix-blend-mode: screen; filter: blur(8px);
        }

        .photo-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: none; transition: all 0.5s; }

        .handwriting-input { 
            position: absolute; bottom: 14px; left: 0; width: 100%; text-align: center; border: none; background: transparent; outline: none; 
            font-family: 'Nanum Pen Script', cursive; font-size: 28px; font-weight: 600; color: #334155; text-shadow: 0px 1px 1px rgba(0,0,0,0.05); z-index: 20; 
        }
        .handwriting-input::placeholder { color: #cbd5e1; font-weight: 400; text-shadow: none; }

        /* --- ⭐️ 全新控制面板：保證手機看得清楚點得到 --- */
        .controls-panel { background: #ffffff; width: 92%; max-width: 380px; border-radius: 20px; padding: 16px 20px; box-shadow: var(--card-shadow); display: flex; flex-direction: column; gap: 14px; }
        
        /* 尺寸區塊 */
        .control-group { display: flex; flex-direction: column; gap: 6px; }
        .control-label { font-size: 0.65rem; font-weight: 700; color: #94a3b8; letter-spacing: 0.05em; margin-left: 4px; }
        .size-tabs { display: flex; background: #f8fafc; border-radius: 12px; padding: 4px; }
        .size-tabs .tab-item { flex: 1; text-align: center; padding: 8px 0; font-size: 0.65rem; font-weight: 700; color: #64748b; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .size-tabs .tab-item.active { background: #ffffff; color: #ff8da1; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        
        /* ⭐️ 風格區塊：用明顯的按鈕取代底線 */
        .style-tabs { display: flex; gap: 6px; }
        .style-tabs .tab-item { flex: 1; text-align: center; padding: 10px 0; font-size: 0.75rem; font-weight: 700; color: #64748b; background: #f1f5f9; border-radius: 12px; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
        .style-tabs .tab-item.active { background: #fff0f5; color: #d8549e; border-color: #ffcce0; box-shadow: 0 4px 10px rgba(255,204,224,0.4); }

        .btn-group { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
        .action-btn { width: 100%; padding: 14px 0; border-radius: 99px; background: var(--btn-gradient); color: white; font-weight: 700; font-size: 0.85rem; letter-spacing: 0.1em; border: none; cursor: pointer; box-shadow: 0 6px 15px rgba(255, 141, 161, 0.3); transition: transform 0.1s; }
        .action-btn:active { transform: scale(0.98); }
        .secondary-btn { width: 100%; padding: 12px 0; border-radius: 99px; background: transparent; border: 2px solid #e2e8f0; color: #64748b; font-weight: 700; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
        .secondary-btn:hover { background-color: #f8fafc; border-color: #cbd5e1; }
        
        .footer-text { text-align: center; margin-top: 4px; font-size: 0.6rem; font-weight: 700; color: #cbd5e1; letter-spacing: 0.05em; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .footer-text::before, .footer-text::after { content: ""; display: block; width: 30px; height: 1px; background-color: #edf2f7; }

        /* ⭐️ 手機版長按儲存遮罩 */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(5px); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content {
            width: 100%; max-width: 360px; display: flex; flex-direction: column; align-items: center; position: relative;
        }
        .modal-close {
            position: absolute; top: -40px; right: 0; color: white; font-size: 1.5rem; background: none; border: none; font-weight: bold; cursor: pointer;
        }
        .modal-img {
            width: 100%; border-radius: 4px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            /* 讓圖片可以被手機原生系統選取長按 */
            pointer-events: auto; user-select: auto; -webkit-user-select: auto; -webkit-touch-callout: default;
        }
        .modal-hint { color: #fff; margin-top: 24px; font-weight: 700; letter-spacing: 0.1em; font-size: 0.9rem; animation: pulseHint 2s infinite; }
        .modal-subhint { color: #94a3b8; margin-top: 8px; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div class="bg-layer">
        <div class="floating-instax fi-1"></div><div class="floating-instax fi-2"></div>
        <div class="floating-instax fi-3"></div><div class="floating-instax fi-4"></div>
    </div>

    <div id="download-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times; 關閉</button>
            <img id="final-result-img" src="" class="modal-img" alt="Your Instax">
            <div class="modal-hint">👇 長按上方圖片儲存至相簿 👇</div>
            <div class="modal-subhint">記得發限動 Tag @aeterna_ewig 拿優惠唷！</div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="camera-icon"><div class="camera-icon-lens"></div></div>
        <h1 class="title-text">Aeterna</h1>
        <p class="subtitle-text">為你的照片加上可愛的即可拍相框與濾鏡 ✨</p>

        <div class="stage">
            <div id="instax-frame-to-print" class="instax-frame size-square">
                
                <div id="reupload-btn" class="reupload-btn" onclick="document.getElementById('file-input').click();">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                    換照片
                </div>

                <div class="photo-area" id="photo-container" data-style="nostalgic">
                    <div class="dashed-border" id="dashed-border"></div>
                    <div class="upload-wrapper" id="upload-wrapper" onclick="document.getElementById('file-input').click()" style="cursor: pointer;">
                        <div class="upload-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </div>
                        <div class="upload-text">START CREATING</div>
                    </div>
                    
                    <img id="preview-image" src="" alt="preview">
                    <div id="photo-overlay" class="photo-overlay"></div>
                    <div id="noise-overlay" class="noise-overlay"></div>
                    <div id="light-leak" class="light-leak"></div>
                    <div class="static-leak"></div>
                    <div id="drag-hint" class="drag-hint">雙指縮放 / 拖曳構圖</div>
                </div>
                <input type="text" id="handwriting-input" class="handwriting-input" placeholder="Tap to write..." maxlength="20">
            </div>
        </div>

        <div class="controls-panel">
            <div class="control-group">
                <div class="control-label">相紙尺寸 SIZE</div>
                <div class="size-tabs">
                    <div class="tab-item" onclick="changeSize('mini', this)">MINI</div>
                    <div class="tab-item active" onclick="changeSize('square', this)">SQUARE</div>
                    <div class="tab-item" onclick="changeSize('wide', this)">WIDE</div>
                </div>
            </div>

            <div class="control-group">
                <div class="control-label">底片風格 FILM RECIPE</div>
                <div class="style-tabs">
                    <div class="tab-item" onclick="changeStyle('ethereal', this)">日系空氣</div>
                    <div class="tab-item active" onclick="changeStyle('nostalgic', this)">經典復古</div>
                    <div class="tab-item" onclick="changeStyle('y2k', this)">街頭漏光</div>
                </div>
            </div>

            <div class="btn-group">
                <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleImageUpload(this)">
                <button class="action-btn" onclick="submitOrder()">立即沖印珍藏</button>
                <button class="secondary-btn" onclick="downloadInstax()">免費下載分享</button>
            </div>
            <div class="footer-text">PREMIUM QUALITY</div>
        </div>
    </div>

    <script>
        (function(){ emailjs.init("RbYyJfklDsrBN3fFk"); })();
        let panzoomInstance = null;
        let currentStyle = 'nostalgic';

        const styleFilters = {
            'ethereal': 'brightness(1.15) contrast(0.9) saturate(0.8) sepia(0.1) hue-rotate(5deg)',
            'nostalgic': 'contrast(1.2) brightness(1.0) saturate(0.9) sepia(0.3) hue-rotate(-15deg)',
            'y2k': 'contrast(1.15) brightness(1.05) saturate(1.4) sepia(0.1)'
        };

        function fitImageToContainer() {
            const img = document.getElementById('preview-image');
            const container = document.getElementById('photo-container');
            if (!img.naturalWidth) return;

            const cw = container.clientWidth;
            const ch = container.clientHeight;
            const imgRatio = img.naturalWidth / img.naturalHeight;
            const containerRatio = cw / ch;

            let finalWidth, finalHeight;
            if (imgRatio > containerRatio) { finalHeight = ch; finalWidth = ch * imgRatio; } 
            else { finalWidth = cw; finalHeight = cw / imgRatio; }

            img.style.width = finalWidth + 'px'; img.style.height = finalHeight + 'px';

            if (panzoomInstance) { panzoomInstance.destroy(); }
            panzoomInstance = Panzoom(img, { maxScale: 5, minScale: 1, contain: 'outside', startScale: 1, step: 0.1 });

            const startX = (cw - finalWidth) / 2; const startY = (ch - finalHeight) / 2;
            setTimeout(() => { panzoomInstance.pan(startX, startY, { silent: true, force: true }); }, 0);
        }

        function handleImageUpload(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.getElementById('preview-image');
                    const overlay = document.getElementById('photo-overlay');
                    const noiseOverlay = document.getElementById('noise-overlay');
                    const hint = document.getElementById('drag-hint');
                    const reuploadBtn = document.getElementById('reupload-btn');
                    
                    img.style.display = 'none';
                    img.classList.remove('instax-effect');
                    void img.offsetWidth; 
                    
                    img.src = e.target.result;
                    
                    img.onload = () => {
                        document.getElementById('dashed-border').style.display = 'none';
                        document.getElementById('upload-wrapper').style.display = 'none';
                        document.getElementById('photo-container').style.cursor = 'move';
                        
                        img.style.display = 'block';
                        fitImageToContainer();
                        img.classList.add('instax-effect'); 
                        overlay.style.display = 'block'; 
                        noiseOverlay.style.display = 'block';
                        
                        const lightLeak = document.getElementById('light-leak');
                        lightLeak.style.display = 'block';
                        lightLeak.classList.remove('light-leak-anim');
                        void lightLeak.offsetWidth; 
                        lightLeak.classList.add('light-leak-anim');
                        
                        reuploadBtn.style.display = 'flex';
                        hint.style.display = 'block';
                        setTimeout(() => { hint.style.display = 'none'; }, 3500);

                        const container = document.getElementById('photo-container');
                        container.addEventListener('wheel', (e) => { if(panzoomInstance) panzoomInstance.zoomWithWheel(e); }, { passive: false });
                    };
                };
                reader.readAsDataURL(file);
            }
        }

        function changeSize(size, element) {
            const frame = document.getElementById('instax-frame-to-print');
            frame.className = `instax-frame size-${size}`;
            document.querySelectorAll('.size-tabs .tab-item').forEach(tab => tab.classList.remove('active'));
            element.classList.add('active');
            if (panzoomInstance) { setTimeout(() => { fitImageToContainer(); }, 350); }
        }

        function changeStyle(style, element) {
            currentStyle = style;
            const container = document.getElementById('photo-container');
            container.setAttribute('data-style', style);

            document.querySelectorAll('.style-tabs .tab-item').forEach(tab => tab.classList.remove('active'));
            element.classList.add('active');

            const img = document.getElementById('preview-image');
            if (img.src && img.style.display !== 'none') {
                img.classList.remove('instax-effect'); void img.offsetWidth; img.classList.add('instax-effect');
                const lightLeak = document.getElementById('light-leak');
                lightLeak.classList.remove('light-leak-anim'); void lightLeak.offsetWidth; lightLeak.classList.add('light-leak-anim');
            }
        }

        async function submitOrder() {
            const img = document.getElementById('preview-image');
            if (img.style.display === 'none' || img.src === '') { alert("請先點擊相框上傳照片唷 ✨"); return; }
            
            const name = prompt("請輸入您的收件人姓名："); if (!name) return;
            const phone = prompt("請輸入您的聯絡電話："); if (!phone) return;
            const activeSize = document.querySelector('.size-tabs .tab-item.active').innerText;
            const btn = document.querySelector('.action-btn');
            
            btn.innerText = "正在為您準備訂單..."; btn.disabled = true;
            try {
                await emailjs.send("service_aeterna", "service_aeterna", { from_name: name, phone_number: phone, message: `尺寸: ${activeSize}` });
                alert("預約成功！即將前往安全付款頁面。"); window.location.href = "https://p.ecpay.com.tw/3C83C78";
            } catch (error) { 
                alert("系統提示：即將前往安全付款頁面。"); window.location.href = "https://p.ecpay.com.tw/3C83C78"; 
            }
        }

        // ⭐️ 終極 iOS 下載解決方案：長按儲存彈窗
        function downloadInstax() {
            const img = document.getElementById('preview-image');
            const inputField = document.getElementById('handwriting-input');
            const reuploadBtn = document.getElementById('reupload-btn'); 

            if (img.style.display === 'none' || img.src === '') { alert("請先上傳照片，才能下載唷 ✨"); return; }
            
            const elementToCapture = document.getElementById('instax-frame-to-print');
            const checkoutBtn = event.currentTarget;
            checkoutBtn.innerText = "正在為您製作照片..."; checkoutBtn.disabled = true;

            reuploadBtn.style.display = 'none';
            document.getElementById('light-leak').style.display = 'none';

            const textVal = inputField.value;
            const textDiv = document.createElement('div');
            textDiv.innerText = textVal; 
            textDiv.style.position = 'absolute'; textDiv.style.bottom = '14px'; textDiv.style.left = '0'; textDiv.style.width = '100%'; textDiv.style.textAlign = 'center'; textDiv.style.fontFamily = "'Nanum Pen Script', cursive"; textDiv.style.fontSize = '28px'; textDiv.style.fontWeight = '600'; textDiv.style.color = '#334155'; textDiv.style.textShadow = '0px 1px 1px rgba(0,0,0,0.05)'; textDiv.style.zIndex = '20';
            
            inputField.style.display = 'none';
            elementToCapture.appendChild(textDiv);

            img.classList.remove('instax-effect'); img.style.animation = 'none';
            img.style.filter = styleFilters[currentStyle];
            void img.offsetWidth;

            setTimeout(() => {
                html2canvas(elementToCapture, { scale: 3, backgroundColor: null, useCORS: true, logging: false, allowTaint: true }).then(canvas => {
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
                    
                    checkoutBtn.innerText = "免費下載分享"; checkoutBtn.disabled = false; 
                    elementToCapture.removeChild(textDiv);
                    inputField.style.display = 'block'; reuploadBtn.style.display = 'flex';

                    // 呼叫全螢幕長按下載彈窗
                    const modal = document.getElementById('download-modal');
                    const modalImg = document.getElementById('final-result-img');
                    modalImg.src = dataUrl;
                    modal.style.display = 'flex';

                }).catch(error => {
                    alert("抱歉，生成圖片時發生錯誤。建議您使用手機內建的截圖功能唷。");
                    checkoutBtn.innerText = "免費下載分享"; checkoutBtn.disabled = false; 
                    elementToCapture.removeChild(textDiv); inputField.style.display = 'block'; reuploadBtn.style.display = 'flex';
                });
            }, 150);
        }

        // 關閉下載彈窗
        function closeModal() {
            document.getElementById('download-modal').style.display = 'none';
        }
    </script>
</body>
