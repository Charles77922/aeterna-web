<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aeterna | Capture the pulse.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #fce7f3 0%, #e0e7ff 50%, #f0f9ff 100%);
            --glass: rgba(255, 255, 255, 0.75);
        }

        body {
            background: var(--primary-gradient);
            background-attachment: fixed;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(219,234,254,0.6) 0%, rgba(255,255,255,0) 70%);
            z-index: -1;
            filter: blur(40px);
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        .instax-card {
            background: #ffffff;
            padding: 16px 16px 64px 16px;
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.08);
            border-radius: 4px;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        .developing { animation: soft-develop 5s ease-out forwards; }
        @keyframes soft-develop {
            0% { filter: contrast(120%) brightness(150%) blur(8px); opacity: 0; }
            100% { filter: contrast(100%) brightness(100%) blur(0); opacity: 1; }
        }

        .control-panel {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 32px;
            padding: 24px;
            width: 100%;
            max-width: 360px;
        }

        .btn-main {
            background: linear-gradient(90deg, #6366f1, #a855f7);
            color: white;
            transition: all 0.3s ease;
        }

        #custom-text {
            font-family: 'Nanum Pen Script', cursive;
            font-size: 28px;
            background: transparent;
            border: none;
            text-align: center;
            width: 100%;
            color: #64748b;
            outline: none;
        }

        .size-tag {
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
        }

        .size-tag.active { background: #1e293b; color: white; }
    </style>
</head>
<body>
    <div class="blob"></div>

    <header class="mt-16 mb-12 text-center">
        <h1 class="text-5xl font-extrabold tracking-tighter text-slate-900">Aeterna<span class="text-indigo-500">.</span></h1>
        <p class="text-slate-400 mt-4 text-xs font-bold tracking-[0.3em] uppercase opacity-80">捕獲瞬間，鍍上永恆</p>
    </header>

    <div id="instax-container" class="instax-card w-[300px] mb-12">
        <div id="drop-zone" onclick="document.getElementById('file-input').click()" class="aspect-[4/5] bg-slate-50 border border-dashed border-slate-200 flex flex-col items-center justify-center cursor-pointer hover:bg-white transition">
            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Select Image</p>
        </div>
        <img id="preview-img" class="hidden w-full aspect-[4/5] object-cover" src="">
        <div class="absolute bottom-5 left-0 w-full px-4">
            <input type="text" id="custom-text" placeholder="Add a memory..." maxlength="20">
        </div>
    </div>

    <div class="control-panel mb-20">
        <div class="flex justify-between mb-8">
            <span onclick="switchSize('mini', this)" class="size-tag">MINI</span>
            <span onclick="switchSize('square', this)" class="size-tag active">SQUARE</span>
            <span onclick="switchSize('wide', this)" class="size-tag">WIDE</span>
        </div>

        <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleImage(this)">
        
        <button id="checkout-btn" onclick="startCheckout()" class="btn-main w-full py-4 rounded-2xl font-bold text-xs tracking-[0.2em] uppercase mb-4">
            即刻沖印 $299
        </button>
        
        <p class="text-[9px] text-center text-slate-400 font-bold tracking-widest uppercase">
            320g Cotton Paper · Wooden Stand · Free Shipping
        </p>
    </div>

    <script>
        // --- 初始化 EmailJS ---
        (function(){
            emailjs.init("RbYyJfklDsrBN3fFk"); // Public Key
        })();

        function handleImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.getElementById('preview-img');
                    const zone = document.getElementById('drop-zone');
                    img.src = e.target.result;
                    img.classList.remove('hidden', 'developing');
                    zone.classList.add('hidden');
                    void img.offsetWidth; 
                    img.classList.add('developing');
                };
                reader.readAsDataURL(file);
            }
        }

        function switchSize(size, el) {
            const card = document.getElementById('instax-container');
            const tags = document.querySelectorAll('.size-tag');
            tags.forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            if(size === 'mini') card.style.width = '240px';
            else if(size === 'square') card.style.width = '300px';
            else card.style.width = '380px';
        }

        async function startCheckout() {
            if (document.getElementById('preview-img').classList.contains('hidden')) {
                alert("請先上傳照片");
                return;
            }

            const name = prompt("請輸入您的收件姓名：");
            if (!name) return;
            const phone = prompt("請輸入聯絡電話：");
            if (!phone) return;

            const btn = document.getElementById('checkout-btn');
            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                // --- 發送通知 ---
                await emailjs.send("service_aeterna", "service_aeterna", {
                    from_name: name,
                    phone_number: phone,
                    message: "Aeterna 實測訂單"
                });
                
                alert("訂單已收到！請點擊確定，我們將導引您至測試支付頁面。");
                window.location.href = "https://sandbox-api-pay.line.me/web/pay/login";
            } catch (error) {
                alert("通知發送出了一點小狀況，但沒關係，我們依然會為您跳轉。");
                window.location.href = "https://sandbox-api-pay.line.me/web/pay/login";
            }
        }
    </script>
</body>
</html>
